<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .timezone-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 15px;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .date-display {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 10px;
        }

        .am-pm {
            font-size: 0.9em;
            color: #999;
            font-weight: normal;
        }

        .info-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .info-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .timezone-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .timezone-input input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .timezone-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .timezone-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .timezone-input button:hover {
            background: #764ba2;
        }

        .custom-clocks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .remove-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .remove-btn:hover {
            background: #ff5252;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .clock-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 15px;
            }

            .time-display {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 World Clock</h1>

    <div class="clock-grid" id="clockGrid">
        <!-- Clocks will be generated here -->
    </div>

    <div class="info-section">
        <h2>➕ Add Custom Timezone</h2>
        <div class="timezone-input">
            <input 
                type="text" 
                id="timezoneInput" 
                placeholder="e.g., Asia/Tokyo, America/New_York, Europe/London"
            >
            <button onclick="addCustomTimezone()">Add Clock</button>
        </div>
        <div class="custom-clocks" id="customClocks">
            <!-- Custom clocks will be added here -->
        </div>
    </div>
</div>

<script>
    // Default timezones
    const defaultTimezones = [
        { name: 'New York', tz: 'America/New_York' },
        { name: 'London', tz: 'Europe/London' },
        { name: 'Paris', tz: 'Europe/Paris' },
        { name: 'Tokyo', tz: 'Asia/Tokyo' },
        { name: 'Sydney', tz: 'Australia/Sydney' },
        { name: 'Dubai', tz: 'Asia/Dubai' }
    ];

    let customTimezones = [];

    // Initialize clocks
    function initializeClocks() {
        displayClocks(defaultTimezones, 'clockGrid');
        updateAllClocks();
        setInterval(updateAllClocks, 1000);
    }

    // Display clocks
    function displayClocks(timezones, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        timezones.forEach((timezone, index) => {
            const clockCard = createClockCard(timezone, index, containerId === 'customClocks');
            container.appendChild(clockCard);
        });
    }

    // Create clock card
    function createClockCard(timezone, index, isCustom) {
        const card = document.createElement('div');
        card.className = 'clock-card';
        card.id = `clock-${isCustom ? 'custom-' : ''}${index}`;

        card.innerHTML = `
            <div class="timezone-name">${timezone.name}</div>
            <div class="timezone-label">${timezone.tz}</div>
            <div class="time-display" id="time-${isCustom ? 'custom-' : ''}${index}">--:--:--</div>
            <div class="date-display" id="date-${isCustom ? 'custom-' : ''}${index}">Loading...</div>
            ${isCustom ? `<button class="remove-btn" onclick="removeCustomTimezone(${index})">Remove</button>` : ''}
        `;

        return card;
    }

    // Update all clocks
    function updateAllClocks() {
        updateClockTimes(defaultTimezones, false);
        updateClockTimes(customTimezones, true);
    }

    // Update clock times
    function updateClockTimes(timezones, isCustom) {
        timezones.forEach((timezone, index) => {
            const timeElement = document.getElementById(`time-${isCustom ? 'custom-' : ''}${index}`);
            const dateElement = document.getElementById(`date-${isCustom ? 'custom-' : ''}${index}`);

            if (timeElement && dateElement) {
                const now = new Date();
                try {
                    const formatter = new Intl.DateTimeFormat('en-US', {
                        timeZone: timezone.tz,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });

                    const dateFormatter = new Intl.DateTimeFormat('en-US', {
                        timeZone: timezone.tz,
                        weekday: 'short',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });

                    const time = formatter.format(now);
                    const date = dateFormatter.format(now);

                    timeElement.textContent = time;
                    dateElement.textContent = date;
                } catch (e) {
                    timeElement.textContent = 'Invalid TZ';
                    dateElement.textContent = 'Check timezone name';
                }
            }
        });
    }

    // Add custom timezone
    function addCustomTimezone() {
        const input = document.getElementById('timezoneInput');
        const timezone = input.value.trim();

        if (!timezone) {
            alert('Please enter a timezone');
            return;
        }

        // Validate timezone
        try {
            new Intl.DateTimeFormat('en-US', { timeZone: timezone });
        } catch (e) {
            alert(`Invalid timezone: "${timezone}"\n\nExamples: America/New_York, Asia/Tokyo, Europe/London`);
            return;
        }

        // Check if already exists
        if (customTimezones.some(tz => tz.tz === timezone)) {
            alert('This timezone already exists');
            return;
        }

        // Add timezone
        const name = timezone.split('/').pop().replace(/_/g, ' ');
        customTimezones.push({ name, tz: timezone });

        // Update display
        displayClocks(customTimezones, 'customClocks');
        input.value = '';
        updateClockTimes(customTimezones, true);
    }

    // Remove custom timezone
    function removeCustomTimezone(index) {
        customTimezones.splice(index, 1);
        displayClocks(customTimezones, 'customClocks');
    }

    // Start the clock
    initializeClocks();
</script>

</body>
</html>
